<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कविता AI - आपकी दोस्त</title>
    <style>
        body { background-color: #0b0e11; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #00ffcc; padding: 20px; border-radius: 15px; background: #161b22; box-shadow: 0 0 15px #00ffcc; }
        input { padding: 12px; width: 70%; border-radius: 8px; border: none; margin-top: 10px; }
        button { padding: 12px 20px; background: #00ffcc; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="msg">नमस्ते प्रिंस भाई!</h1>
        <p id="status">मैं आपकी कविता हूँ...</p>
        <input type="text" id="userInput" placeholder="यहाँ कुछ लिखो...">
        <br>
        <button onclick="talk()">बात करें</button>
    </div>

    <script>
        let userName = localStorage.getItem("uName");

        // अगर नाम नहीं पता तो पूछो
        if (!userName) {
            userName = prompt("नमस्ते! आपका नाम क्या है?");
            if(userName) localStorage.setItem("uName", userName);
        }

        const msg = document.getElementById("msg");
        msg.innerText = "नमस्ते " + (userName || "दोस्त") + " भाई!";

        // बोलने वाला फंक्शन
        function speak(text) {
            let speech = new SpeechSynthesisUtterance();
            speech.text = text;
            speech.lang = "hi-IN"; // हिंदी आवाज़
            speech.rate = 1;
            window.speechSynthesis.speak(speech);
        }

        function talk() {
            let input = document.getElementById("userInput").value.toLowerCase();
            let reply = "";

            if (input.includes("hello") || input.includes("नमस्ते")) {
                reply = "नमस्ते " + userName + " भाई! कैसे हो आप?";
            } else if (input.includes("कैसे हो")) {
                reply = "मैं बहुत अच्छी हूँ, आप बताओ क्या चल रहा है?";
            } else {
                reply = "अभी मेरा दिमाग बन रहा है, पर आपकी बात सुनकर अच्छा लगा!";
            }

            document.getElementById("status").innerText = reply;
            speak(reply); // यहाँ कविता बोलेगी!
        }
    </script>
</body>
</html>
